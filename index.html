<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Biblioteca Premium</title>
    <style>
        :root { --secondary: #a855f7; --aura: rgba(168, 85, 247, 0.4); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: #000; color: white; font-family: 'Segoe UI', sans-serif; min-height: 100dvh; overflow-x: hidden;
        }

        /* Fondos Animados */
        #bg-video-main { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.3); }
        .aura-overlay { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, var(--aura) 0%, transparent 75%); pointer-events: none; }

        /* Header Adaptativo */
        .header { 
            position: sticky; top: 0; width: 100%; height: 80px; padding: env(safe-area-inset-top) 5% 0; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 1000; 
            display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--secondary); 
        }

        .search-box { background: rgba(255,255,255,0.1); border: 1px solid var(--secondary); border-radius: 8px; padding: 10px 15px; color: white; outline: none; width: 60%; }

        /* Catálogo */
        .contenedor { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 30px 20px; padding: 40px 20px 80px; position: relative; z-index: 10;
        }
        .card-container { width: 100%; height: 280px; position: relative; }
        .card { 
            position: absolute; width: 100%; height: 100%; background: #050505; border-radius: 12px; 
            transition: transform 0.3s ease; cursor: pointer; border: 1px solid #222; overflow: hidden;
        }
        .card:hover { transform: scale(1.05); border-color: var(--secondary); box-shadow: 0 0 20px var(--aura); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-body { padding: 10px; background: #050505; }
        .card-body b { font-size: 10px; color: var(--secondary); text-transform: uppercase; }
        .card-body p { font-size: 13px; font-weight: bold; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Pantalla Detalle */
        .pantalla-full { display: none; position: fixed; inset: 0; background: #000; z-index: 6000; overflow-y: auto; padding-bottom: 50px; }
        #hero-cont { position: relative; height: 45vh; width: 100%; overflow: hidden; }
        .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, #000 100%); z-index: 1; }
        #hero-video { width: 100%; height: 100%; object-fit: cover; }
        .info-content { padding: 0 8%; position: relative; z-index: 2; margin-top: -30px; }
        .info-meta { color: var(--secondary); font-weight: bold; margin-bottom: 15px; font-size: 14px; text-transform: uppercase; }
        .ep-card { background: #111; padding: 15px; border-radius: 10px; border-left: 4px solid var(--secondary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-big { background: var(--secondary); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 10px; cursor: pointer; }

        /* --- REPRODUCTOR HACKEADO PARA EL NOTCH --- */
        #pantalla-player { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 9999; overflow: hidden; 
        }
        /* El wrapper es más ancho que la pantalla para "comerse" el notch */
        .video-wrapper { 
            position: absolute; top: 50%; left: 50%; 
            width: 108vw; height: 100dvh; 
            transform: translate(-50%, -50%);
        }
        #main-iframe { width: 100%; height: 100%; border: none; }

        .btn-ui {
            position: absolute; z-index: 10001; top: calc(15px + env(safe-area-inset-top));
            background: rgba(0,0,0,0.7); color: white; border: 1.5px solid var(--secondary);
            padding: 10px 18px; border-radius: 8px; font-weight: bold;
        }
        .btn-close { left: calc(15px + env(safe-area-inset-left)); }
        .btn-list { right: calc(15px + env(safe-area-inset-right)); }

        #menu-episodios { 
            position: fixed; right: 15px; top: 80px; width: 260px; max-height: 60vh;
            background: #0a0a0a; border: 2px solid var(--secondary); border-radius: 12px;
            z-index: 10002; padding: 10px; display: none; overflow-y: auto;
        }
        .ep-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; }
        .ep-item.active { background: var(--secondary); color: white; border-radius: 6px; }

    </style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video-main"><source src="Biblioteca.mp4" type="video/mp4"></video>
<div class="aura-overlay"></div>

<div id="home">
    <div class="header">
        <h1>MI <span style="color:var(--secondary)">BIBLIOTECA</span></h1>
        <input type="text" class="search-box" placeholder="Buscar..." onkeyup="filtrar()">
    </div>
    <div class="contenedor" id="catalogo"></div>
</div>

<div id="pantalla-info" class="pantalla-full">
    <div id="hero-cont">
        <div class="hero-gradient"></div>
        <video id="hero-video" loop playsinline></video>
    </div>
    <div class="info-content">
        <h1 id="info-titulo" style="font-size: 28px;"></h1>
        <div id="info-meta" class="info-meta"></div> 
        <p id="info-desc" style="color:#bbb; line-height: 1.4; margin-bottom: 20px;"></p>
        <button class="btn-big" onclick="abrirPlayer(0)">▶ REPRODUCIR</button>
        <button class="btn-big" onclick="cerrarInfo()" style="background:#222;">VOLVER</button>
        <h3 style="margin: 30px 0 15px; color: var(--secondary);">CONTENIDO</h3>
        <div id="lista-episodios-info"></div>
    </div>
</div>

<div id="pantalla-player">
    <button class="btn-ui btn-close" onclick="cerrarPlayer()">✕ SALIR</button>
    <button class="btn-ui btn-list" onclick="toggleEps()">LISTA ☰</button>
    <div class="video-wrapper">
        <iframe id="main-iframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div id="menu-episodios"><div id="lista-eps-player"></div></div>
</div>

<script>
    const API_KEY = '6de1162b511f00bd38d39d7eb38396e9';

    const DATABASE = [
        {
            nombre: "Fullmetal Alchemist",
            tmdb_id: "37863",
            trailer: "Fullmetal Alchemist Opening 4 _Rewrite_  _1080p60fps_.mp4",
            videos: [
                { t: "Episodio 1", id: "1H05vvUGWykQ6tnuApYV6EOEREVf4Kkqa" },
                { t: "Episodio 2", id: "1Dqj5yyS1hoU42x6KqCNEdnYvCYsaGfY2" }
                // ... agrega el resto de tus IDs aquí
            ]
        },
        {
            nombre: "Your Name",
            tmdb_id: "372058",
            trailer: "Your Name Trailer Español Latino.mp4",
            videos: [{ t: "Película Completa", id: "1YZVGxDSWUv1Kgg1h9NPeHrXbNy9PhE-R" }]
        }
        // ... puedes pegar aquí el resto de SERIES, PELICULAS y ESPECIALES
    ];

    let seleccionado = null;

    async function cargar() {
        const cat = document.getElementById('catalogo');
        cat.innerHTML = ''; 
        for (let item of DATABASE) {
            try {
                const tipo = item.videos.length > 1 ? "tv" : "movie";
                const res = await fetch(`https://api.themoviedb.org/3/${tipo}/${item.tmdb_id}?api_key=${API_KEY}&language=es-ES`);
                const data = await res.json();
                const card = document.createElement('div');
                card.className = 'card-container';
                card.innerHTML = `
                    <div class="card">
                        <img src="https://image.tmdb.org/t/p/w500${data.poster_path}">
                        <div class="card-body">
                            <b>${item.videos.length} ENTREGAS</b>
                            <p>${item.nombre}</p>
                        </div>
                    </div>`;
                card.onclick = () => verInfo(item, data);
                cat.appendChild(card);
            } catch(e) { console.error("Error cargando item"); }
        }
    }

    function verInfo(item, data) {
        seleccionado = item;
        document.getElementById('pantalla-info').style.display = 'block';
        document.getElementById('info-titulo').innerText = item.nombre;
        document.getElementById('info-desc').innerText = data.overview;
        const v = document.getElementById('hero-video');
        v.src = item.trailer; v.play();
        
        const lista = document.getElementById('lista-episodios-info');
        lista.innerHTML = '';
        item.videos.forEach((vid, i) => {
            const div = document.createElement('div');
            div.className = 'ep-card';
            div.innerHTML = `<span>${vid.t}</span> ▶`;
            div.onclick = () => abrirPlayer(i);
            lista.appendChild(div);
        });
    }

    function abrirPlayer(idx) {
        document.getElementById('pantalla-player').style.display = 'block';
        reproducir(idx);
    }

    function reproducir(idx) {
        const vid = seleccionado.videos[idx];
        document.getElementById('main-iframe').src = `https://drive.google.com/file/d/${vid.id}/preview`;
        
        const listaPlayer = document.getElementById('lista-eps-player');
        listaPlayer.innerHTML = '';
        seleccionado.videos.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = `ep-item ${i === idx ? 'active' : ''}`;
            div.innerText = v.t;
            div.onclick = () => { reproducir(i); toggleEps(); };
            listaPlayer.appendChild(div);
        });
    }

    function cerrarPlayer() {
        document.getElementById('pantalla-player').style.display = 'none';
        document.getElementById('main-iframe').src = '';
    }

    function cerrarInfo() {
        document.getElementById('pantalla-info').style.display = 'none';
        document.getElementById('hero-video').pause();
    }

    function toggleEps() {
        const m = document.getElementById('menu-episodios');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function filtrar() {
        const q = document.querySelector('.search-box').value.toLowerCase();
        document.querySelectorAll('.card-container').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none';
        });
    }

    cargar();
</script>
</body>
</html>
